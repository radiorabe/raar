version: 2
updates:
  - package-ecosystem: gem
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      rails:
        patterns:
          - railties
          - activesupport
          - actionpack
          - activerecord
          - activemodel
          - actionview
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch" # ignore patch versions to reduce noise
      - dependency-name: "railties"
        update-types:
          - "version-update:semver-major" # leave major version updates to devs
      - dependency-name: "active*"
        update-types:
          - "version-update:semver-major" # leave major version updates to devs
      - dependency-name: "action*"
        update-types:
          - "version-update:semver-major" # leave major version updates to devs
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci): "
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
